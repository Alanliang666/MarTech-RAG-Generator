version: '3.8'

services:
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    restart: always

  api:
    build: .

    ports:
      - "8000:8000"

    depends_on:
      - redis

  worker:
    build: .

    command: celery -A src.worker.main worker --loglevel=info

    depends_on:
      - redis
